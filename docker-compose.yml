services:
  mysql:
    image: mysql:8.0
    container_name: dicoding-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dicoding_jobs
      MYSQL_USER: dicoding
      MYSQL_PASSWORD: password123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dicoding-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Dicoding Jobs"
      APP_ENV: production
      APP_KEY: base64:E//cWyTh/LyJRYkL+8mD72Y+8cgT0eZO1eK5HqmDDN4=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: dicoding_jobs
      DB_USERNAME: dicoding
      DB_PASSWORD: password123
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dicoding-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  mysql_data:
