services:
  playwright-test:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    environment:
      - BASE_URL=${BASE_URL:-http://host.docker.internal:3000}
      - API_URL=${API_URL:-http://host.docker.internal:8000/api}
      - CI=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend/playwright-report:/app/playwright-report
      - ./frontend/test-results:/app/test-results
    network_mode: host
